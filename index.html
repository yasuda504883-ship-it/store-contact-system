<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STAR GUYS 店舗連絡管理</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">STAR GUYS Store Contact</p>
        <h1>掲載店舗 連絡管理</h1>
        <p class="lead">店舗マスターから必要な案件だけを追加して、連絡・撮影状況を管理します。</p>
      </div>
      <div class="hero-stats">
        <div class="hero-card"><span class="hero-number" id="totalStores">0</span><span>登録案件</span></div>
        <div class="hero-card"><span class="hero-number" id="visibleStores">0</span><span>表示中</span></div>
      </div>
    </header>

    <nav class="app-tabs" aria-label="ページ切り替え">
      <button class="tab-button active" type="button" data-view="stores">案件管理</button>
      <button class="tab-button" type="button" data-view="gantt">ガント</button>
      <button class="tab-button" type="button" data-view="tasks">個人タスク</button>
    </nav>

    <section class="summary-grid" id="summaryCards"></section>

    <section id="storesView" class="view-section active">
      <section class="panel add-panel">
        <div class="section-heading"><div><h2>案件を追加</h2><p>店舗候補は残したまま、実際に動かす案件だけを追加できます。</p></div></div>
        <form id="storeForm" class="store-form">
          <label>店名<input id="storeName" type="text" list="storeSuggestions" placeholder="例：ETERNAL / ACQUA / 店名の一部" autocomplete="off" required /></label>
          <datalist id="storeSuggestions"></datalist>
          <label>エリア<select id="storeArea"></select></label>
          <label>担当者<select id="assignee"></select></label>
          <label>連絡ステータス<select id="status"></select></label>
          <label>案件種別<select id="caseType"></select></label>
          <label>次回連絡予定<input id="targetDate" type="date" /></label>
          <button type="submit">追加</button>
        </form>
      </section>

      <section class="toolbar panel">
        <label>店名・メモ検索<input id="searchText" type="search" placeholder="店名やメモで検索" /></label>
        <label>エリアで絞り込み<select id="filterArea"><option value="all">全エリア</option></select></label>
        <label>担当者で絞り込み<select id="filterAssignee"><option value="all">全員</option></select></label>
        <label>ステータスで絞り込み<select id="filterStatus"><option value="all">すべて</option></select></label>
        <button id="resetData" class="danger" type="button" hidden>全案件削除</button>
      </section>

      <section class="panel sync-panel">
        <div><h2>スプレッドシート同期</h2><p id="syncStatus">未同期です</p></div>
        <div class="sync-actions"><button id="loadSheet" type="button">スプシから読込</button><button id="seedSheet" type="button">現在の案件をスプシへ反映</button></div>
      </section>

      <section class="panel area-panel">
        <div class="section-heading"><div><h2>エリア別 案件一覧</h2><p id="visibleCount">0件表示中</p></div></div>
        <div id="areaList" class="area-list"></div>
      </section>
    </section>

    <section id="ganttView" class="view-section">
      <section class="panel gantt-panel full-width">
        <div class="section-heading"><div><h2>進捗ガント</h2><p>連絡状況・撮影状態・案件種別を一覧で確認できます。</p></div></div>
        <div id="ganttChart" class="gantt-chart"></div>
      </section>
    </section>

    <section id="tasksView" class="view-section">
      <section class="task-summary-grid" id="taskSummary"></section>

      <section class="panel sync-panel">
        <div><h2>タスク同期</h2><p id="taskSyncStatus">端末内のタスクを表示しています。</p></div>
        <div class="sync-actions"><button id="loadTasksFromSheet" type="button">最新を読込</button><button id="pushTasksToSheet" type="button">この端末から反映</button></div>
      </section>

      <section class="panel">
        <div class="section-heading"><div><h2>個人タスクを追加</h2><p>案件に紐づく作業と、個人的な作業をまとめて管理できます。</p></div></div>
        <form id="taskForm" class="task-form">
          <label>タスク名<input id="taskTitle" type="text" placeholder="例：PV初稿を作成" required /></label>
          <label>担当者<select id="taskAssignee"></select></label>
          <label>期限<input id="taskDueDate" type="date" /></label>
          <label>優先度<select id="taskPriority"><option>高</option><option selected>中</option><option>低</option></select></label>
          <label>関連店舗<input id="taskStore" type="text" list="taskStoreSuggestions" placeholder="店名を入力・選択" autocomplete="off" /></label>
          <datalist id="taskStoreSuggestions"></datalist>
          <label>エリア<select id="taskStoreArea"></select></label>
          <label>メモ<input id="taskMemo" type="text" placeholder="任意" /></label>
          <button type="submit">タスク追加</button>
        </form>
      </section>

      <section class="panel task-toolbar">
        <label>検索<input id="taskSearch" type="search" placeholder="タスク名・店舗・メモ" /></label>
        <label>担当者<select id="taskFilterAssignee"><option value="all">全員</option></select></label>
        <label>表示<select id="taskDateFilter"><option value="all">すべて</option><option value="today">今日</option><option value="overdue">期限切れ</option><option value="week">今週</option><option value="completed">完了済み</option></select></label>
        <label>状態<select id="taskStatusFilter"><option value="all">すべて</option><option>未着手</option><option>進行中</option><option>完了</option></select></label>
        <button id="clearCompletedTasks" class="danger" type="button">完了済み削除</button>
      </section>

      <section class="panel">
        <div class="section-heading"><div><h2>タスク一覧</h2><p id="taskVisibleCount">0件表示中</p></div></div>
        <div id="taskList" class="task-list"></div>
      </section>
    </section>
  </div>

  <script src="config.js"></script>
  <script src="stores.js"></script>
  <script src="stores-extra.js"></script>
  <script src="store-links.js"></script>
  <script src="script.js"></script>
  <script src="case-enhancements.js"></script>
  <script src="tasks.js"></script>
  <script src="task-store-picker.js"></script>
  <script src="store-links-ui.js"></script>
</body>
</html>
